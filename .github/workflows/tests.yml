name: tests

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
    env:
      PYTHONDONTWRITEBYTECODE: "1"
      AWGPANEL_SECRET_KEY: "github-actions-test-secret"
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Prepare isolated test runtime
        shell: bash
        run: |
          TEST_ROOT="$RUNNER_TEMP/sg-awg-panel"
          mkdir -p "$TEST_ROOT"
          {
            echo "AWGPANEL_DB=$TEST_ROOT/panel.db"
            echo "AWGPANEL_DATA_DIR=$TEST_ROOT/data"
            echo "AWGPANEL_BACKUP_DIR=$TEST_ROOT/backups"
            echo "AWGPANEL_ACCESS_JOBS_DIR=$TEST_ROOT/access-jobs"
            echo "AWGPANEL_OPERATION_JOBS_DIR=$TEST_ROOT/operation-jobs"
            echo "AWGPANEL_TRAFFIC_STATE_DIR=$TEST_ROOT/traffic-rules"
            echo "AWGPANEL_TRAFFIC_LOCK=$TEST_ROOT/traffic.lock"
            echo "AWGPANEL_OUTBOUND_CONFIG_DIR=$TEST_ROOT/outbounds"
            echo "AWGPANEL_AWG_CONFIG_DIR=$TEST_ROOT/amneziawg"
            echo "AWGPANEL_PLACEHOLDER_PATH=$TEST_ROOT/placeholder/index.html"
            echo "AWGPANEL_ENV_FILE=$TEST_ROOT/web.env"
            echo "AWGPANEL_UPDATE_STATUS=$TEST_ROOT/update/status.json"
            echo "AWGPANEL_UPDATE_LOG=$TEST_ROOT/update/update.log"
            echo "AWGPANEL_DNSMASQ_CONFIG=$TEST_ROOT/dnsmasq/sg-awg-traffic.conf"
            echo "AWGPANEL_TRAFFIC_SCHEDULE_STATE=$TEST_ROOT/traffic-rules/schedule-state.json"
          } >> "$GITHUB_ENV"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt pytest

      - name: Check Python syntax
        run: python -m compileall -q awgpanel node_agent tests

      - name: Run tests
        # RC4 tests exercise root-only installer bridges and the privileged
        # default AWG UDP port 585, matching the production service runtime.
        run: sudo -E "$(command -v python)" -m pytest -q

      - name: Check shell syntax
        run: find . -type f -name '*.sh' -print0 | xargs -0 -n1 bash -n
