name: tests

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
    env:
      PYTHONDONTWRITEBYTECODE: "1"
      AWGPANEL_SECRET_KEY: "github-actions-test-secret"
      AWGPANEL_DB: "${{ runner.temp }}/sg-awg-panel/panel.db"
      AWGPANEL_DATA_DIR: "${{ runner.temp }}/sg-awg-panel/data"
      AWGPANEL_BACKUP_DIR: "${{ runner.temp }}/sg-awg-panel/backups"
      AWGPANEL_ACCESS_JOBS_DIR: "${{ runner.temp }}/sg-awg-panel/access-jobs"
      AWGPANEL_OPERATION_JOBS_DIR: "${{ runner.temp }}/sg-awg-panel/operation-jobs"
      AWGPANEL_TRAFFIC_STATE_DIR: "${{ runner.temp }}/sg-awg-panel/traffic-rules"
      AWGPANEL_TRAFFIC_LOCK: "${{ runner.temp }}/sg-awg-panel/traffic.lock"
      AWGPANEL_OUTBOUND_CONFIG_DIR: "${{ runner.temp }}/sg-awg-panel/outbounds"
      AWGPANEL_AWG_CONFIG_DIR: "${{ runner.temp }}/sg-awg-panel/amneziawg"
      AWGPANEL_PLACEHOLDER_PATH: "${{ runner.temp }}/sg-awg-panel/placeholder/index.html"
      AWGPANEL_ENV_FILE: "${{ runner.temp }}/sg-awg-panel/web.env"
      AWGPANEL_UPDATE_STATUS: "${{ runner.temp }}/sg-awg-panel/update/status.json"
      AWGPANEL_UPDATE_LOG: "${{ runner.temp }}/sg-awg-panel/update/update.log"
      AWGPANEL_DNSMASQ_CONFIG: "${{ runner.temp }}/sg-awg-panel/dnsmasq/sg-awg-traffic.conf"
      AWGPANEL_TRAFFIC_SCHEDULE_STATE: "${{ runner.temp }}/sg-awg-panel/traffic-rules/schedule-state.json"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
      - name: Prepare isolated test runtime
        run: mkdir -p "${{ runner.temp }}/sg-awg-panel"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt pytest
      - name: Run tests
        run: python -m pytest -q
      - name: Check shell syntax
        run: find . -type f -name '*.sh' -print0 | xargs -0 -n1 bash -n
