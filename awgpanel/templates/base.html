<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}SG-AWG-Panel{% endblock %}</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='app.css') }}">
</head>
<body>
<header class="topbar">
  <div class="brand">
    <strong>SG-AWG-Panel</strong>
    <span class="version">v{{ panel_version }}</span>
  </div>
  {% if session.get('authenticated') %}
  <nav class="topnav" aria-label="Главное меню">
    <a class="nav-link {{ 'active' if request.endpoint == 'dashboard' else '' }}" href="{{ url_for('dashboard') }}">Сервер</a>
    <a class="nav-link {{ 'active' if request.endpoint == 'diagnostics' else '' }}" href="{{ url_for('diagnostics') }}">Диагностика</a>
  </nav>
  <form method="post" action="{{ url_for('logout') }}">
    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
    <button class="button secondary" type="submit">Выйти</button>
  </form>
  {% endif %}
</header>
<main class="container">
  {% with messages = get_flashed_messages(with_categories=true) %}
    {% for category, message in messages %}
      <div class="flash {{ category }}">{{ message }}</div>
    {% endfor %}
  {% endwith %}
  {% block content %}{% endblock %}
</main>
</body>
</html>
